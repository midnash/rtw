
name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Rename JAR to custom name
        run: |
          JAR=$(ls build/libs/*.jar | head -n 1)
          MODNAME=$(grep archives_base_name gradle.properties | cut -d'=' -f2)
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          CUSTOM_NAME="${MODNAME}-${TAG_NAME}.jar"
          mv "$JAR" "build/libs/$CUSTOM_NAME"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: build/libs

      - name: Get mod name and tag
        id: meta
        run: |
          MODNAME=$(grep archives_base_name gradle.properties | cut -d'=' -f2)
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          echo "modname=$MODNAME" >> $GITHUB_OUTPUT
          echo "tagname=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tagname }}
          files: build/libs/${{ steps.meta.outputs.modname }}-${{ steps.meta.outputs.tagname }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
